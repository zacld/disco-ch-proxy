name = "disco-ch-proxy"
main = "worker.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# No KV, no Durable Objects needed for this proxy
# Secret CH_API_KEY is set via: wrangler secret put CH_API_KEY

[vars]
# Non-secret config vars (none needed currently)

# Optional: restrict to custom domain
# [routes]
# pattern = "disco-proxy.yourdomain.com/*"
# zone_name = "yourdomain.com"
